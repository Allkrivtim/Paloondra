# Paloondra frontend/reverse-proxy.
#
# "backend" below is the docker-compose service name for the API container,
# and "4000" is its default PORT (backend/.env.example). If you change
# either the service name in docker-compose.yml or PORT in backend/.env,
# update the proxy_pass targets below to match and rebuild this image.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    # Uploads go through /api/sftp/upload - match the backend's own multer
    # limit (backend/src/routes/sftp.routes.ts) so nginx doesn't reject large
    # files before they ever reach it.
    client_max_body_size 500m;

    root /usr/share/nginx/html;
    index index.html;

    # Static frontend. try_files falls back to index.html for any path that
    # isn't a real file, so client-side routing (react-router) keeps working
    # on a hard refresh/direct link to a tab (e.g. /rcon, /sftp).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API. No trailing path on proxy_pass, so the matched URI
    # (e.g. /api/auth/login) is forwarded to the backend unchanged.
    location /api/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket endpoints: RCON console, SSH terminal, live start/stop/
    # restart script output, and the metrics feed. These are long-lived
    # connections, so the read/send timeouts are raised well above nginx's
    # 60s default - otherwise an idle terminal or console gets silently
    # disconnected.
    location /ws/ {
        proxy_pass http://backend:4000;
        proxy_http_version 1.1;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }
}
