services:
  backend:
    build:
      context: ./backend
    restart: unless-stopped
    volumes:
      # backend/.env is bind-mounted (not loaded via `env_file:`) on purpose:
      # Compose's env_file parsing treats $VAR/${VAR} as interpolation and
      # would silently mangle bcrypt hashes in USERS (they contain literal
      # $ characters). Mounting the file lets the app's own dotenv loader
      # read it as-is, exactly like running it outside Docker.
      - ./backend/.env:/app/.env:ro
      # Persists the scheduler's tasks and the audit log (DATA_DIR in
      # backend/.env, default ./data - resolved relative to /app, i.e. this
      # volume) across container recreation. This is local to the backend
      # container/host, unrelated to the target Minecraft server.
      - paloondra-data:/app/data
    extra_hosts:
      # Lets RCON_HOST/SSH_HOST in backend/.env be "host.docker.internal"
      # when the Minecraft server runs on the same physical machine as
      # Docker - 127.0.0.1 inside this container is the container itself,
      # not the Docker host, so that value would otherwise be unreachable.
      - "host.docker.internal:host-gateway"
    networks:
      - paloondra
    # No ports published - only the frontend's nginx reaches this, over the
    # internal network, by proxying /api and /ws to it.

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - paloondra

networks:
  paloondra:
    driver: bridge

volumes:
  paloondra-data:
